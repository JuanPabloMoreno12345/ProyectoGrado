<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido a mi mundo</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 2s ease-in-out;
    }

    h1 {
      font-size: 3em;
      margin-bottom: 0.2em;
    }

    p {
      font-size: 1.2em;
      max-width: 500px;
      margin: 0 auto 1em;
    }

    button {
      padding: 12px 24px;
      font-size: 1em;
      background: #ff758c;
      border: none;
      border-radius: 30px;
      color: white;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
      transition: transform 0.3s ease;
    }

    button:hover {
      transform: scale(1.1);
      background: #ff7eb3;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: translateY(-40px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌌 Bienvenido</h1>
    <p>Estás a punto de descubrir algo asombroso. Esta es una página simple pero llena de estilo, elegancia y potencial.</p>
    <button onclick="alert('¡Vamos allá! 🚀')">Entrar</button>
  </div>
</body>
</html>
